server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header X-Permitted-Cross-Domain-Policies "none" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8080; img-src 'self' data:; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location = /config.js {
    add_header Cache-Control "no-store" always;
    try_files /config.js =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://leaderboard-api:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
  }

  location /actuator/ {
    proxy_pass http://leaderboard-api:8080/actuator/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
  }

  location / {
    add_header Cache-Control "no-store" always;
    try_files $uri /index.html;
  }
}
